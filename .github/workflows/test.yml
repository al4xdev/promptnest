name: Test Suite

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run test pipeline
        uses: ./.ci-cd/test
        with:
          python-version: ${{ matrix.python-version }}

  optional-integrations:
    name: Optional integration dependencies
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install every official integration
        run: uv sync --all-extras --dev

      - name: Run adapter tests
        run: uv run pytest tests/test_adapters.py

      - name: Import optional frameworks
        env:
          HOME: /tmp/promptnest-home
          XDG_DATA_HOME: /tmp/promptnest-home/share
        run: |
          uv run python -c "import crewai, langchain, langgraph, openai"

  package:
    name: Package distributions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run build pipeline
        uses: ./.ci-cd/build
